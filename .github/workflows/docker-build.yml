name: Build and Push Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      iac_generator_version:
        description: 'IAC Generator version to build (e.g., v0.1.21). Leave blank to use the latest release.'
        required: false
        type: string
      tooling_aws_version:
        description: 'hashicorp/aws version to spoof under the aws3tooling path (see Dockerfile)'
        required: false
        default: '3.74.0'
        type: string

env:
  IMAGE_NAME: facetscloud/iac-generator

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Get IAC Generator version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.iac_generator_version }}"
          else
            # Use the tag name from the release event
            VERSION="${{ github.event.release.tag_name }}"
          fi

          # Fall back to the latest published release when no version is supplied.
          # Uses the public GitHub API — no token required. Repo is public.
          if [ -z "$VERSION" ]; then
            echo "No iac_generator_version provided; resolving latest release tag via public GitHub API"
            VERSION=$(curl -sfL -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/Facets-cloud/iac-generator-releases/releases/latest" \
              | jq -r '.tag_name // empty')
            if [ -z "$VERSION" ]; then
              echo "::error::Could not resolve latest release tag from Facets-cloud/iac-generator-releases. Provide iac_generator_version explicitly."
              exit 1
            fi
            echo "Using latest release: ${VERSION}"
          fi

          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::IAC Generator version '$VERSION' does not match the expected format 'vMAJOR.MINOR.PATCH' (e.g., v0.1.21). Release tarball URLs are built from this and would 404."
            exit 1
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building for IAC Generator version: ${VERSION}"
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.get_version.outputs.version }}
            type=raw,value=latest
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IAC_GENERATOR_VERSION=${{ steps.get_version.outputs.version }}
            TOOLING_AWS_VERSION=${{ github.event.inputs.tooling_aws_version || '3.74.0' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max